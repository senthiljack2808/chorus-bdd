spring.application.name=ReportPortalSpringBootApp
server.port=9080

# ReportPortal API Configuration
rp.endpoint=http://<domain_name>:8080
rp.api.key=<your_reportportal_api_key>

# Disable default DataSource auto-configuration since we're using custom external DB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# External Database Configuration (for manual JDBC connections)
external.db.url=jdbc:mysql://<db_host>:3306/<database_name>
external.db.username=<username>
external.db.password=<password>
external.db.driver=com.mysql.cj.jdbc.Driver



# Logging Configuration
logging.level.org.example.reportportalspringbootapp=INFO
logging.level.org.springframework.web=DEBUG

# SpringDoc OpenAPI Configuration
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/swagger-ui.html
